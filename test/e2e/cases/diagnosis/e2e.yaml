# This file is used to show how to write configuration files and can be used to test.

setup:
  env: kind
  file: kind.k28.yaml
  init-system-environment: ../../base/env
  kind:
    import-images:
      - apache/skywalking-rover:latest
    expose-ports:
      - namespace: istio-system
        resource: service/skywalking-ui
        port: 80
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install swctl
      command: bash test/e2e/base/scripts/prepare/setup-e2e-shell/install.sh swctl
    - name: install kubectl
      command: bash test/e2e/base/scripts/prepare/setup-e2e-shell/install.sh kubectl
    - name: install istio
      command: |
        # the istio version must be compatible with the kind node kubernetes version,
        # the combination aligns with the istio cases in the main skywalking repository.
        # download the pinned istioctl explicitly and prefer it on the PATH,
        # the pre-installed istioctl on the host may be a different version
        export ISTIO_VERSION=${ISTIO_VERSION:-1.29.0}
        mkdir -p /tmp/skywalking-infra-e2e/istio && cd /tmp/skywalking-infra-e2e/istio
        if [ ! -f istio-$ISTIO_VERSION/bin/istioctl ]; then
          curl -L https://istio.io/downloadIstio | sh -
        fi
        export PATH=$PWD/istio-$ISTIO_VERSION/bin:$PATH
        istioctl version --remote=false
        istioctl install -y --set profile=demo
        kubectl label namespace default istio-injection=enabled
    - name: Install helm
      command: bash test/e2e/base/scripts/prepare/setup-e2e-shell/install.sh helm
    - name: Install SkyWalking
      command: |
        helm -n istio-system install skywalking \
          oci://ghcr.io/apache/skywalking-helm/skywalking-helm \
          --version "0.0.0-${SW_KUBERNETES_COMMIT_SHA}" \
          --set fullnameOverride=skywalking \
          --set elasticsearch.replicas=1 \
          --set elasticsearch.minimumMasterNodes=1 \
          --set oap.replicas=1 \
          --set ui.image.repository=ghcr.io/apache/skywalking/ui \
          --set ui.image.tag=${SW_OAP_COMMIT} \
          --set oap.image.tag=${SW_OAP_COMMIT} \
          --set oap.image.repository=ghcr.io/apache/skywalking/oap \
          --set oap.storageType=elasticsearch \
          -f test/e2e/base/kubernetes-values.yaml
      wait:
        - namespace: istio-system
          resource: deployments/skywalking-oap
          for: condition=available
    - name: Deploy demo services
      command: |
        export ISTIO_VERSION=${ISTIO_VERSION:-1.29.0}
        kubectl apply -f https://raw.githubusercontent.com/istio/istio/$ISTIO_VERSION/samples/bookinfo/platform/kube/bookinfo.yaml
        kubectl apply -f https://raw.githubusercontent.com/istio/istio/$ISTIO_VERSION/samples/bookinfo/networking/bookinfo-gateway.yaml
        kubectl apply -f https://raw.githubusercontent.com/istio/istio/$ISTIO_VERSION/samples/bookinfo/networking/destination-rule-all.yaml
        kubectl apply -f https://raw.githubusercontent.com/istio/istio/$ISTIO_VERSION/samples/bookinfo/networking/virtual-service-all-v1.yaml
      wait:
        - namespace: default
          resource: pod
          for: condition=Ready
    - name: Install SkyWalking Rover
      command: |
        envsubst < test/e2e/cases/diagnosis/rover.yaml | kubectl apply -f -
      wait:
        - namespace: default
          resource: pod
          for: condition=Ready
  timeout: 25m

verify:
  retry:
    count: 20
    interval: 10s
  cases:
    # rover-cli could list the discovered productpage processes
    - query: bash test/e2e/cases/diagnosis/verify/process-list.sh
      expected: expected/cli-process-list.yml
    # rover-cli could trace the tcp connect operations of the productpage processes
    - query: bash test/e2e/cases/diagnosis/verify/trace-connect.sh
      expected: expected/cli-trace-connect.yml
